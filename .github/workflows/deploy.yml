name: Deploy

on:
  push:
    branches: [main]

# Required for GitHub OIDC → AWS role assumption (no stored AWS keys)
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: family-tree-backups-777312966064

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # ── Upload artifacts to S3 ───────────────────────────────────────────────
      # Tarball contains compiled dist dirs + package files (no node_modules).
      # The deploy script runs `npm ci --omit=dev` on the instance to install deps.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package & upload artifact
        run: |
          tar -czf deploy.tar.gz \
            package.json package-lock.json \
            packages/shared/package.json packages/shared/dist/ \
            packages/backend/package.json packages/backend/dist/ \
            packages/backend/prisma/ packages/backend/ecosystem.config.cjs \
            packages/frontend/dist/ \
            scripts/deploy-server.sh

          ARTIFACT_KEY="deploy/${{ github.sha }}.tar.gz"
          aws s3 cp deploy.tar.gz "s3://$S3_BUCKET/$ARTIFACT_KEY"
          aws s3 cp scripts/deploy-server.sh "s3://$S3_BUCKET/deploy/deploy-server.sh"

          echo "ARTIFACT_KEY=$ARTIFACT_KEY" >> "$GITHUB_ENV"

      # ── Deploy via SSM Run Command ───────────────────────────────────────────
      # The instance downloads the artifact from S3 and runs the deploy script.
      # No SSH key required — SSM Session Manager handles auth via IAM role.
      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-id "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ github.sha }}" \
            --parameters "commands=[\"aws s3 cp s3://$S3_BUCKET/deploy/deploy-server.sh /tmp/ds.sh && bash /tmp/ds.sh $ARTIFACT_KEY $S3_BUCKET\"]" \
            --output text \
            --query "Command.CommandId")

          echo "SSM command: $CMD_ID"

          # Poll until complete (max 5 min, 10 s intervals)
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/30] $STATUS"

            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" --output text
              exit 0
            fi

            if [[ "$STATUS" =~ ^(Failed|Cancelled|TimedOut|Undeliverable)$ ]]; then
              echo "--- STDERR ---"
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" --output text >&2
              exit 1
            fi

            sleep 10
          done
          echo "Timed out waiting for SSM command"
          exit 1
